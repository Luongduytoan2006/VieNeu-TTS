# LOCAL TEST ONLY — the full PA3 stack on one machine, one network, so we can
# verify BE↔model-server↔storage end-to-end in Docker before splitting across two
# real machines. Production uses docker-compose.yaml (GPU) + docker-compose.vps.yaml
# (BE) separately.
#
#   docker compose -f docker-compose.localtest.yaml up -d --build
#
# The model-server here runs the CPU/ONNX path (Dockerfile.vps base is torch-free,
# so we reuse the GPU Dockerfile for a true image but WITHOUT the nvidia device
# reservation — device=auto falls back to ONNX/CPU when no GPU is granted). To test
# the real GPU path, set the `deploy` block (commented) and have NVIDIA runtime.
services:
  db:
    image: postgres:16-alpine
    container_name: vieneu-pg-test
    environment:
      - POSTGRES_USER=vieneu
      - POSTGRES_PASSWORD=vieneu
      - POSTGRES_DB=vieneu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vieneu"]
      interval: 5s
      timeout: 3s
      retries: 10

  model-server:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: vieneu-model:gpu
    container_name: vieneu-model-test
    ports:
      - "9000:9000"          # exposed so we can hit /model/v1 directly during the test
    volumes:
      - hf-cache:/root/.cache/huggingface
      - storage:/workspace/.ask/storage
    environment:
      - HOST=0.0.0.0
      - PORT=9000
      - MODEL_API_KEY=test-key-123
      # The BE reaches the model-server by its compose service name on the shared
      # network, so stored-audio URLs must use that host (not localhost).
      - MODEL_SERVER_PUBLIC_URL=http://model-server:9000
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_DIR=/workspace/.ask/storage
      - PYTHONUNBUFFERED=1
    # Real GPU passthrough (this machine has an RTX 4060 + nvidia runtime). Remove
    # this block on a CPU-only host → device=auto falls back to ONNX/CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  be:
    build:
      context: .
      dockerfile: Dockerfile.vps
    image: vieneu-be:cpu
    container_name: vieneu-be-test
    depends_on:
      db:
        condition: service_healthy
      model-server:
        condition: service_started
    ports:
      - "8080:7862"
    environment:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_MODE=remote
      - MODEL_SERVER_URL=http://model-server:9000
      - MODEL_API_KEY=test-key-123
      - VIENEU_DATABASE_URL=postgresql+psycopg://vieneu:vieneu@db:5432/vieneu
      - PYTHONUNBUFFERED=1

volumes:
  hf-cache:
  storage:
