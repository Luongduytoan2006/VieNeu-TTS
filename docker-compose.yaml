# ── VieNeu-TTS · VPS backend (CPU-only) ──────────────────────────────────────
# Chạy TOÀN BỘ app trên 1 máy VPS chỉ-CPU bằng một lệnh:
#
#     docker compose up -d
#
# Sau đó:
#   • API   → http://localhost:7862/docs   (prefix /api/v1)
#   • Demo  → http://localhost:7870        (giao diện gọi ngược lại API :7862)
#
# Model tự tải từ Hugging Face lần đầu (~1.5GB) vào named volume `hf-cache`, nên
# các lần khởi động sau KHÔNG tải lại. Audio (khi STORAGE_BACKEND=local) ghi ra
# ./server/data trên host để xem trực tiếp.
#
# ⚠️  CHỈ dùng cho VPS CPU. Server GPU KHÔNG dùng Docker — Vast.ai on-demand kéo
#     code thẳng từ GitHub rồi tự chạy (xem server/src/services/gpu_vastai.py).
#     Các biến VAST_* / R2_* trong .env dành cho luồng GPU đó, container này
#     không bắt buộc phải có.
# -----------------------------------------------------------------------------
services:
  vieneu-vps:
    build:
      # Context = repo root để COPY được pyproject.toml, uv.lock, server/, demo/.
      context: .
      dockerfile: docker/Dockerfile.vps
    image: vieneu-vps:cpu
    container_name: vieneu-vps
    # .env ở repo root: R2_* + VAST_* (config.py cũng tự đọc .env này, đây là để
    # Docker truyền vào môi trường tiến trình).
    env_file:
      - .env
    environment:
      # config.py mặc định đã đúng, khai báo tường minh cho chắc chắn:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_DEMO_PORT=7870
      # Nạp model ngay lúc khởi động (tránh trễ ở request đầu).
      - MODEL_EAGER_LOAD=1
      # VPS chỉ-CPU: lưu + phục vụ audio ngay tại chỗ qua /files/{key}. Muốn dùng
      # Cloudflare R2 thì bỏ dòng này và đặt STORAGE_BACKEND=r2 trong .env.
      - STORAGE_BACKEND=local
      # DB dùng Postgres nội bộ compose (service 'db'). Deploy ngoài: đổi trong .env.
      - DATABASE_URL=postgresql://vieneu:vieneu@db:5432/vieneu
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7862:7862"   # API (FastAPI /api/v1 + /docs)
      - "7870:7870"   # Giao diện demo
    volumes:
      # Cache Hugging Face → không tải lại model mỗi lần dựng container.
      - hf-cache:/root/.cache/huggingface
      # Audio local (STORAGE_LOCAL_DIR = server/data) — giữ trên host để xem.
      - ./server/data:/app/server/data
    restart: unless-stopped

  # PostgreSQL — giọng custom của user + jobs. Trong mạng compose, API gọi qua
  # host 'db' cổng 5432 (không expose ra ngoài; dev độc lập dùng docker-compose.pg.yaml).
  db:
    image: postgres:16-alpine
    container_name: vieneu-vps-db
    environment:
      POSTGRES_USER: vieneu
      POSTGRES_PASSWORD: vieneu
      POSTGRES_DB: vieneu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vieneu"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  hf-cache:
  pgdata:
