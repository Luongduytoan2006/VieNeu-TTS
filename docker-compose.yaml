# ── VieNeu-TTS · PROD / server (CPU-only, app) ───────────────────────────────
# Deploy trên server: CHỈ chạy app. DB dùng PostgreSQL RIÊNG của bạn (managed/
# container khác) — trỏ qua DATABASE_URL trong .env. Chạy 1 lệnh:
#
#     docker compose up -d
#
# Sau đó:
#   • API   → http://localhost:7862/docs   (prefix /api/v1)
#   • Demo  → http://localhost:7870        (giao diện gọi ngược lại API :7862)
#
# Model tự tải từ Hugging Face lần đầu (~1.5GB) vào named volume `hf-cache`.
# Audio (khi STORAGE_BACKEND=local) ghi ra ./server/data trên host.
#
# ⚠️  Muốn chạy DEV có sẵn cả DB (không cài Postgres tay) → dùng
#     docker-compose.dev.yaml (app + Postgres kèm theo).
# ⚠️  Server GPU KHÔNG dùng Docker — Vast.ai on-demand kéo code từ GitHub rồi tự
#     chạy (server/src/services/gpu_vastai.py). VAST_* / R2_* trong .env cho luồng đó.
# -----------------------------------------------------------------------------
services:
  vieneu-vps:
    build:
      # Context = repo root để COPY được pyproject.toml, uv.lock, server/, demo/.
      context: .
      dockerfile: docker/Dockerfile.vps
    image: vieneu-vps:cpu
    container_name: vieneu-vps
    # .env ở repo root: DATABASE_URL (Postgres của bạn) + R2_* + VAST_*.
    env_file:
      - .env
    environment:
      # config.py mặc định đã đúng, khai báo tường minh cho chắc chắn:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_DEMO_PORT=7870
      # Nạp model ngay lúc khởi động (tránh trễ ở request đầu).
      - MODEL_EAGER_LOAD=1
      # VPS chỉ-CPU: lưu + phục vụ audio ngay tại chỗ qua /files/{key}. Muốn dùng
      # Cloudflare R2 thì bỏ dòng này và đặt STORAGE_BACKEND=r2 trong .env.
      - STORAGE_BACKEND=local
      # DATABASE_URL: KHÔNG hardcode ở đây — lấy từ .env (Postgres riêng của server).
    ports:
      - "7862:7862"   # API (FastAPI /api/v1 + /docs)
      - "7870:7870"   # Giao diện demo
    volumes:
      # Cache Hugging Face → không tải lại model mỗi lần dựng container.
      - hf-cache:/root/.cache/huggingface
      # Audio local (STORAGE_LOCAL_DIR = server/data) — giữ trên host để xem.
      - ./server/data:/app/server/data
    restart: unless-stopped

volumes:
  hf-cache:
