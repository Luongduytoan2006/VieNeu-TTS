# ── VieNeu-TTS · app (CPU) + PostgreSQL ──────────────────────────────────────
# MỘT môi trường duy nhất (dev = deploy). Chạy 1 lệnh:
#
#     docker compose up -d
#
#   • UI    → http://localhost:7862/       (giao diện, cùng cổng API)
#   • API   → http://localhost:7862/docs   (prefix /api/v1)
#   • DB    → localhost:7432               (Postgres, cũng nối được từ app chạy tay)
#
# TOÀN BỘ cấu hình app đọc từ .env ở repo root — KHÔNG hardcode biến app ở đây,
# nên sửa .env rồi `docker compose up -d` là đổi. Muốn đổi biến gì → sửa .env.
#
# ⚠️  DATABASE_URL trong .env phải trỏ host 'db' (@db:5432) khi chạy bằng Docker
#     (mạng nội bộ compose). Chạy TAY ngoài Docker thì đổi 'db'→'localhost:7432'.
# ⚠️  Model tự tải từ Hugging Face lần đầu (~1.5GB) vào named volume 'hf-cache'.
# ⚠️  Server GPU KHÔNG dùng Docker — Vast.ai on-demand kéo code từ GitHub rồi tự
#     chạy (server/src/services/gpu_vastai.py). VAST_* / R2_* trong .env cho luồng đó.
# -----------------------------------------------------------------------------
services:
  app:
    build:
      # Context = repo root để COPY được pyproject.toml, uv.lock, server/, ui/.
      context: .
      dockerfile: docker/Dockerfile.vps
    image: vieneu-vps:cpu
    container_name: vieneu-app
    # .env ở repo root là NGUỒN CẤU HÌNH DUY NHẤT (server + model + DB + R2 + Vast).
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7862:7862"   # UI (/) + API (/api/v1 + /docs) — cùng cổng
    volumes:
      # Cache Hugging Face → không tải lại model mỗi lần dựng container.
      - hf-cache:/root/.cache/huggingface
      # Audio local (khi STORAGE_BACKEND=local) — giữ trên host để xem.
      - ./server/data:/app/server/data
    restart: unless-stopped

  # PostgreSQL — giọng custom của user + jobs. Credential lấy từ .env (POSTGRES_*).
  db:
    image: postgres:16-alpine
    container_name: vieneu-db
    env_file:
      - .env
    ports:
      - "7432:5432"   # expose để app chạy tay ngoài Docker cũng nối được
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  hf-cache:
  pgdata:
