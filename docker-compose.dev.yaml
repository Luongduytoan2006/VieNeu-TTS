# ── VieNeu-TTS · DEV (app CPU + PostgreSQL, cả cụm) ───────────────────────────
# Chạy DEV đầy đủ trong Docker: app + DB kèm theo, KHÔNG phải cài Postgres tay.
#
#     docker compose -f docker-compose.dev.yaml up -d
#
#   • API   → http://localhost:7862/docs
#   • Demo  → http://localhost:7870
#   • DB    → localhost:7432 (Postgres, cũng nối được từ app chạy tay ngoài Docker)
#
# App gọi DB qua host 'db' (mạng compose). Cổng 7432 expose ra host để bạn chạy
# `python server/main.py` trực tiếp mà vẫn dùng chung DB này (DATABASE_URL mặc
# định trỏ localhost:7432). Data ở named volume — không mất khi tắt.
#
# Deploy thật: dùng docker-compose.yaml (chỉ app) + Postgres riêng qua DATABASE_URL.
# -----------------------------------------------------------------------------
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.vps
    image: vieneu-vps:cpu
    container_name: vieneu-dev-app
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_DEMO_PORT=7870
      - MODEL_EAGER_LOAD=1
      - STORAGE_BACKEND=local
      # DB nội bộ compose (service 'db'): app gọi qua host 'db' cổng 5432.
      - DATABASE_URL=postgresql://vieneu:vieneu@db:5432/vieneu
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7862:7862"   # API
      - "7870:7870"   # Demo UI
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./server/data:/app/server/data
    restart: unless-stopped

  # PostgreSQL — giọng custom của user + jobs.
  db:
    image: postgres:16-alpine
    container_name: vieneu-dev-db
    environment:
      POSTGRES_USER: vieneu
      POSTGRES_PASSWORD: vieneu
      POSTGRES_DB: vieneu
    ports:
      - "7432:5432"   # expose để app chạy tay ngoài Docker cũng nối được
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vieneu"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  hf-cache:
  pgdata:
