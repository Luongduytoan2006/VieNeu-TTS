services:
  vieneu-tts:
    build: .
    image: vieneu-tts:local
    container_name: vieneu-tts-web
    ports:
      - "7862:7862"
    volumes:
      # Only the HF model cache and generated outputs persist across restarts --
      # application code is baked into the image itself (see Dockerfile), not
      # bind-mounted, so this is safe to run from a bare `docker pull` with none of
      # this repo checked out locally.
      - hf-cache:/root/.cache/huggingface
      - ./outputs:/workspace/outputs
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7862
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:
