# VPS compose = the CPU backend (logic only) + Postgres. NO GPU, NO model.
# Run this on the cheap CPU VPS:
#   docker compose -f docker-compose.vps.yaml up -d --build
#
# The BE forwards synthesis to the GPU model-server (docker-compose.yaml, possibly
# on another machine) via MODEL_SERVER_URL + MODEL_API_KEY. Customers only ever
# talk to this BE (port 7862): create job → poll % → download (proxied from the
# model-server's storage).
services:
  db:
    image: postgres:16-alpine
    container_name: vieneu-pg
    environment:
      - POSTGRES_USER=vieneu
      - POSTGRES_PASSWORD=vieneu
      - POSTGRES_DB=vieneu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vieneu"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  be:
    build:
      context: .
      dockerfile: Dockerfile.vps
    image: vieneu-be:cpu
    container_name: vieneu-be
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7862:7862"
    environment:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_MODE=remote
      # Where the GPU model-server lives (change to the GPU box's address).
      - MODEL_SERVER_URL=${MODEL_SERVER_URL:-http://host.docker.internal:9000}
      - MODEL_API_KEY=${MODEL_API_KEY:-change-me-secret}
      - VIENEU_DATABASE_URL=postgresql+psycopg://vieneu:vieneu@db:5432/vieneu
      - VIENEU_FORCE_HTTPS=1
      - PYTHONUNBUFFERED=1
    # So the container can reach a model-server running on the host during local test.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
