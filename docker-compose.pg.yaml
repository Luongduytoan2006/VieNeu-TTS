# ── VieNeu-TTS · PostgreSQL (dev) ────────────────────────────────────────────
# DB lưu giọng custom của user + jobs. Dựng 1 lệnh:
#
#     docker compose -f docker-compose.pg.yaml up -d
#
# Khớp DATABASE_URL mặc định: postgresql://vieneu:vieneu@localhost:7432/vieneu
# Cổng 7432 (7 như BE 78xx + 432 như Postgres 5432) để không đụng Postgres 5432
# có sẵn trên máy. Data giữ ở named volume `vieneu-pgdata` (không mất khi tắt).
#
# Deploy thật: KHÔNG cần compose này — chỉ trỏ DATABASE_URL sang Postgres của bạn.
# -----------------------------------------------------------------------------
services:
  vieneu-pg:
    image: postgres:16-alpine
    container_name: vieneu-pg
    environment:
      POSTGRES_USER: vieneu
      POSTGRES_PASSWORD: vieneu
      POSTGRES_DB: vieneu
    ports:
      - "7432:5432"
    volumes:
      - vieneu-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vieneu"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  vieneu-pgdata:
