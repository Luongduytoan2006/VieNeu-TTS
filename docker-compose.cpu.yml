# CPU-only deployment (no GPU) — for the Proxmox CT which has no NVIDIA device.
# Runs the torch-free ONNX engine. Same unified server: UI at "/", REST at
# "/api/v1", Swagger at "/docs", all on port 7862 (the single port the CT exposes
# through nginx).
#
# Usage on the server:
#   docker compose -f docker-compose.cpu.yml up -d --build
services:
  vieneu-tts:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: vieneu-tts:cpu
    container_name: vieneu-tts-api
    ports:
      - "7862:7862"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./outputs:/workspace/outputs
    environment:
      - HOST=0.0.0.0
      - PORT=7862
      - VIENEU_API_MOUNT_UI=1
      # Served over HTTPS behind Cloudflare+nginx → make Gradio emit https:// URLs
      # so the browser doesn't block audio as mixed content.
      - VIENEU_FORCE_HTTPS=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7862
      - PYTHONUNBUFFERED=1
      # v3 Turbo synthesis is autoregressive (one frame at a time), so ONNX Runtime's
      # default "use every core" hurts: thread-sync overhead dominates. Measured on the
      # 32-CPU CT, 1 thread (0.39x RTF) beat 16 threads (0.19x) — 2x faster. Pin to 1.
      - OMP_NUM_THREADS=1
      - ORT_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    restart: unless-stopped

volumes:
  hf-cache:
