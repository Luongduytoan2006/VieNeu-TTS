text_settings:
  max_chars_per_chunk: 256
  max_total_chars_streaming: 3000

backbone_configs:
  "VieNeu-TTS (GPU)":
    repo: pnnbao-ump/VieNeu-TTS
    supports_streaming: false
    description: "⭐ Chất lượng cao nhất, yêu cầu GPU/MPS"
  "VieNeu-TTS-0.3B (GPU)":
    repo: pnnbao-ump/VieNeu-TTS-0.3B
    supports_streaming: false
    description: "⚡ Bản 0.3B tối ưu cho GPU, rất nhanh và chính xác"
  "VieNeu-TTS-v3-Turbo (Thử nghiệm)":
    repo: pnnbao-ump/VieNeu-TTS-v3-Turbo
    supports_streaming: false
    description: "🆕 v3 Turbo (early access) — 48kHz. Giọng mặc định dùng speaker token (ổn định hơn); Voice Cloning clone từ audio mẫu. Bản dùng thử trước; v3 đầy đủ sẽ ra mắt trong vài tuần tới."
  "VieNeu-TTS-v2-Turbo (CPU)":
    repo: pnnbao-ump/VieNeu-TTS-v2-Turbo-GGUF
    supports_streaming: true
    description: "🚀 Turbo v2: Siêu nhanh, hỗ trợ multi-lingual, tối ưu cho CPU. (Không hỗ trợ Voice Cloning — dùng v3 trở lên để clone giọng.)"

codec_configs:
  "NeuCodec (Distill)":
    repo: neuphonic/distill-neucodec
    description: "Codec mặc định cho model GPU"
    use_preencoded: false
  "VieNeu-Codec":
    repo: pnnbao-ump/VieNeu-Codec
    description: "Codec tối ưu cho Turbo v2 (ONNX)"
    use_preencoded: false

