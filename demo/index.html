<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VieNeu-TTS — Demo</title>
<style>
  :root { --bg:#0f1419; --card:#1a2029; --line:#2a3340; --fg:#e6edf3; --mut:#8b98a5;
          --acc:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg);
         color:var(--fg); line-height:1.5; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 18px 60px; }
  h1 { font-size:22px; margin:0 0 2px; }
  .sub { color:var(--mut); font-size:13px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:18px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 5px; }
  textarea, select, input { width:100%; background:#0d1117; color:var(--fg);
          border:1px solid var(--line); border-radius:8px; padding:10px; font-size:14px;
          font-family:inherit; }
  textarea { min-height:130px; resize:vertical; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:150px; }
  .meta { display:flex; justify-content:space-between; font-size:12px; color:var(--mut);
          margin-top:6px; }
  button { background:var(--acc); color:#fff; border:0; border-radius:8px; padding:11px 20px;
          font-size:15px; font-weight:600; cursor:pointer; margin-top:16px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); }
  .modes { display:flex; gap:8px; margin-top:6px; }
  .modes .opt { flex:1; text-align:center; padding:9px; border:1px solid var(--line);
          border-radius:8px; cursor:pointer; font-size:13px; user-select:none; }
  .modes .opt.on { border-color:var(--acc); background:rgba(59,130,246,.12); color:#fff; }
  .modes .opt.dis { opacity:.45; cursor:not-allowed; }
  .bar { height:8px; background:#0d1117; border-radius:99px; overflow:hidden; margin-top:14px; }
  .bar > i { display:block; height:100%; width:0; background:var(--acc); transition:width .3s; }
  .status { font-size:13px; margin-top:10px; min-height:20px; }
  .pill { display:inline-block; padding:1px 8px; border-radius:99px; font-size:12px;
          font-weight:600; }
  .pill.cpu { background:rgba(34,197,94,.15); color:var(--ok); }
  .pill.gpu { background:rgba(245,158,11,.15); color:var(--warn); }
  audio { width:100%; margin-top:14px; }
  .err { color:var(--err); }
  .hint { font-size:12px; color:var(--mut); margin-top:4px; }
  code { background:#0d1117; padding:1px 5px; border-radius:4px; font-size:12px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:99px; margin-right:5px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎙️ VieNeu-TTS</h1>
  <div class="sub">Giao diện gọi API <code id="apibase">…</code> (cổng riêng) ·
    <a id="docslink" href="#" style="color:var(--acc)">Swagger</a></div>

  <div class="card">
    <div class="meta">
      <span><span class="dot" id="hdot"></span><span id="health">đang kiểm tra…</span></span>
      <span id="voicecount"></span>
    </div>

    <label for="text">Văn bản</label>
    <textarea id="text" placeholder="Nhập văn bản tiếng Việt…">Xin chào, đây là VieNeu-TTS, hệ thống tổng hợp giọng nói tiếng Việt.</textarea>
    <div class="meta">
      <span id="charcount">0 từ</span>
      <span id="gpuhint"></span>
    </div>

    <div class="row">
      <div>
        <label for="voice">Giọng</label>
        <select id="voice"></select>
      </div>
      <div>
        <label for="style">Phong cách</label>
        <select id="style"></select>
      </div>
    </div>

    <label>Chế độ xử lý</label>
    <div class="modes" id="modes">
      <div class="opt on" data-mode="auto">Auto</div>
      <div class="opt" data-mode="cpu">CPU</div>
      <div class="opt" data-mode="gpu">GPU</div>
    </div>
    <div class="hint" id="modehint">Auto: BE tự chọn — GPU khi văn bản đủ dài, còn lại CPU.</div>

    <button id="go">Tổng hợp</button>
    <button id="cancel" class="ghost" style="display:none">Hủy</button>

    <div class="bar"><i id="prog"></i></div>
    <div class="status" id="status"></div>
    <audio id="audio" controls style="display:none"></audio>
  </div>
</div>

<script>
// API base do main.py nhúng (window.__API_BASE__) vì giao diện chạy ở CỔNG KHÁC.
// Fallback: cùng origin (khi ai đó mở file qua chính API server).
const API = (window.__API_BASE__ || "") + "/api/v1";
const $ = (id) => document.getElementById(id);
let GPU_MIN = 1000, curMode = "auto", pollTimer = null, curJob = null;

const wordCount = (s) => (s.trim().match(/\S+/g) || []).length;

async function jget(p){ const r = await fetch(API+p); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.status); return r.json(); }

// ── init: health + voices + styles ──────────────────────────────────────────
async function init(){
  // Hiện API base + link Swagger đúng cổng API (giao diện chạy cổng khác).
  const apiOrigin = window.__API_BASE__ || location.origin;
  $("apibase").textContent = apiOrigin + "/api/v1";
  $("docslink").href = apiOrigin + "/docs";
  try{
    const h = await jget("/health");
    GPU_MIN = h.gpu_min_words || 1000;
    const ok = h.model_loaded;
    $("hdot").style.background = ok ? "var(--ok)" : "var(--warn)";
    $("health").textContent = `${h.status} · ${h.backend||"?"}/${h.device||"?"} · ${h.backbone_repo||""}`;
    $("voicecount").textContent = `${h.num_voices} giọng`;
  }catch(e){ $("hdot").style.background="var(--err)"; $("health").textContent="không kết nối được BE"; }

  try{
    const v = await jget("/voices");
    $("voice").innerHTML = v.voices.map(x =>
      `<option value="${x.id}" ${x.is_default?"selected":""}>${x.label}</option>`).join("");
  }catch(e){ $("voice").innerHTML = "<option value=''>(model chưa sẵn sàng)</option>"; }

  try{
    const s = await jget("/styles");
    $("style").innerHTML = s.styles.map(x =>
      `<option value="${x.id}" ${x.is_default?"selected":""}>${x.label}</option>`).join("");
  }catch(e){}

  updateChars();
}

function updateChars(){
  const n = wordCount($("text").value);
  $("charcount").textContent = `${n} từ`;
  const longEnough = n >= GPU_MIN;
  $("gpuhint").textContent = longEnough ? "✓ đủ dài cho GPU" : `cần ≥ ${GPU_MIN} từ cho GPU`;
  // GPU mode bị vô hiệu khi context ngắn (chặn lớp FE — BE vẫn chặn lần 2).
  const gpuOpt = document.querySelector('.opt[data-mode="gpu"]');
  gpuOpt.classList.toggle("dis", !longEnough);
  if(!longEnough && curMode==="gpu"){ setMode("auto"); }
}

function setMode(m){
  const opt = document.querySelector(`.opt[data-mode="${m}"]`);
  if(opt.classList.contains("dis")) return;
  curMode = m;
  document.querySelectorAll(".modes .opt").forEach(o=>o.classList.toggle("on", o.dataset.mode===m));
  $("modehint").textContent = ({
    auto:"Auto: BE tự chọn — GPU khi văn bản đủ dài, còn lại CPU.",
    cpu:"CPU: chạy in-process ngay trên server này.",
    gpu:"GPU: tạo máy Vast.ai theo yêu cầu, xong hủy máy.",
  })[m];
}

// ── tạo job + poll ──────────────────────────────────────────────────────────
async function synth(){
  $("audio").style.display="none"; $("status").textContent=""; $("status").className="status";
  $("prog").style.width="0";
  const body = { text:$("text").value, voice:$("voice").value||null,
                 style:$("style").value, mode:curMode };
  let res;
  try{
    const r = await fetch(API+"/tts", {method:"POST", headers:{"Content-Type":"application/json"},
                                       body:JSON.stringify(body)});
    res = await r.json();
    if(!r.ok) throw new Error(res.detail||r.status);
  }catch(e){ $("status").innerHTML=`<span class="err">Lỗi: ${e.message}</span>`; return; }

  curJob = res.id;
  $("go").disabled=true; $("cancel").style.display="inline-block";
  const badge = `<span class="pill ${res.mode}">${res.mode.toUpperCase()}</span>`;
  $("status").innerHTML = `${badge} đã tạo job <code>${res.id.slice(0,8)}</code>…`;
  poll(res.id, res.mode);
}

function poll(id, mode){
  clearTimeout(pollTimer);
  pollTimer = setTimeout(async ()=>{
    let j;
    try{ j = await jget("/tts/"+id); }catch(e){ return poll(id, mode); }
    const badge = `<span class="pill ${j.mode}">${j.mode.toUpperCase()}</span>`;
    $("prog").style.width = (j.progress||0)+"%";
    if(j.status==="running"||j.status==="queued"){
      $("status").innerHTML = `${badge} ${j.status}… ${j.progress}% (${j.done_chunks}/${j.total_chunks})`;
      poll(id, mode);
    } else if(j.status==="done"){
      done();
      $("status").innerHTML = `${badge} ✓ xong · ${j.duration_sec}s audio · ${j.elapsed_sec}s xử lý`;
      const a=$("audio"); a.src = API+`/tts/${id}/download`; a.style.display="block"; a.play().catch(()=>{});
    } else if(j.status==="cancelled"){
      done(); $("status").innerHTML = `${badge} đã hủy.`;
    } else {
      done(); $("status").innerHTML = `<span class="err">Lỗi: ${j.error||"unknown"}</span>`;
    }
  }, 1000);
}

function done(){ $("go").disabled=false; $("cancel").style.display="none"; clearTimeout(pollTimer); }

async function cancel(){
  if(!curJob) return;
  await fetch(API+"/tts/"+curJob, {method:"DELETE"}).catch(()=>{});
}

// ── wire ────────────────────────────────────────────────────────────────────
$("text").addEventListener("input", updateChars);
$("go").addEventListener("click", synth);
$("cancel").addEventListener("click", cancel);
document.querySelectorAll(".modes .opt").forEach(o =>
  o.addEventListener("click", ()=>setMode(o.dataset.mode)));
init();
</script>
</body>
</html>
